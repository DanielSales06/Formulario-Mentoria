<!DOCTYPE html>
<html lang="pt-br">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário Mentoria</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Staatliches&display=swap" rel="stylesheet"> 

  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="Page">
    <header>
      <h1>Mentoria</h1>
      <p>Preencha o formulário abaixo para agendar a sua mentoria</p>
    </header>
    <form id="form">
      <fieldset>
        <div class="fieldset-wrapper">
          <legend>Informações pessoais</legend>
          <div class="col-2">
            <div class="input-wrapper">
              <label for="first-name">Nome</label>
              <input id="first-name" type="text" required maxlength="25">
            </div>

            <div class="input-wrapper">
              <label for="sub-name">Sobrenome</label>
              <input id="sub-name" type="text" required maxlength="25">
            </div>
          </div>

            <div class="input-wrapper">
              <label for="email">Email<span>(digite um email válido)</span></label>
              <input id="email" type="email" required>
            </div>

            <div class="input-wrapper">
              <label for="password">Senha<span>(mínimo de 6 caracteres)</span></label>
              <input id="password" type="password" required minlength="6">
            </div>
            
        </div>
      </fieldset>

      <fieldset>
        <div class="fieldset-wrapper">
          <legend>Informações do mentor</legend>
            <div class="input-wrapper">
              <label for="tutor-name">Nome do seu mentor <span>(só o primeiro nome)</span></label>
              <input id="tutor-name" type="text" required maxlength="15">
            </div>
        </div>
      </fieldset>

      <fieldset>
        <div class="fieldset-wrapper">
          <legend>Seus horários disponíveis</legend>
          <h2>Primeira mentoria</h2>
          <div class="col-3">
            <div class="input-wrapper">
              <label for="event-date-1">Data<span>(DD/MM/AAAA)</span></label>
              <input id="event-date-1" type="date" required>
            </div>

            <div class="input-wrapper">
              <label for="event-begin-1">Das</label>
              <input id="event-begin-1" type="time" required>
            </div>

            <div class="input-wrapper">
              <label for="event-end-1">Até</label>
              <input id="event-end-1" type="time" required>
            </div>
        </div>

        <h2>Segunda mentoria</h2>
        <div class="col-3">
            <div class="input-wrapper">
              <label for="event-date-2">Data<span>(DD/MM/AAAA)</span></label>
              <input id="event-date-2" type="date" required > 
            </div>

            <div class="input-wrapper">
              <label for="event-begin-2">Das</label>
              <input id="event-begin-2" type="time" required>
            </div>

            <div class="input-wrapper">
              <label for="event-end-2">Até</label>
              <input id="event-end-2" type="time" required>
            </div>
        </div>
      </fieldset>

    </form>

    <footer>
      <input class="button" form="form" type="submit" value="Salvar">
    </footer>
  </div>
</body>
</html>
